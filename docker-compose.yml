# pick-a-bank — hot-reload dev stack

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: pick-a-bank-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pab_secret}
      POSTGRES_DB: ${POSTGRES_DB:-pick_a_bank}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pab}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - pab-net

  # ── Backend  (Node 20 Debian + Firefox for scraping) ─────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: pick-a-bank-backend
    restart: unless-stopped
    # Firefox needs user-namespace creation — either SYS_ADMIN cap or
    # seccomp=unconfined. We use seccomp=unconfined (less privilege than SYS_ADMIN).
    security_opt:
      - seccomp=unconfined
    cap_add:
      - SYS_ADMIN
    ports:
      - "5101:5101"
    environment:
      - NODE_ENV=development
      - PORT=5101
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pab}:${POSTGRES_PASSWORD:-pab_secret}@db:5432/${POSTGRES_DB:-pick_a_bank}
      - CORS_ORIGIN=http://localhost:5100
      - PLAYWRIGHT_BROWSERS_PATH=/app/pw-browsers
      - MOZ_DISABLE_CONTENT_SANDBOX=1
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - FRONTEND_URL=${FRONTEND_URL}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/pw-browsers
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pab-net

  # ── Frontend (Vite HMR) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: pick-a-bank-frontend
    restart: unless-stopped
    ports:
      - "5100:5100"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:5101
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - pab-net

networks:
  pab-net:
    driver: bridge
    name: pab-net

volumes:
  pg_data:
    name: pick-a-bank-pg-data
